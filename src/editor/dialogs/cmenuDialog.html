<style>
    .contextMenu {
        position: fixed;
        z-index: 99999;
        min-width: 200px;
        border: solid 1px var(--chrome-border, rgba(0, 0, 0, .33));
        background: var(--chrome-bg, rgba(255, 255, 255, .98));
        color: var(--fg, #222);
        padding: 5px 0;
        margin: 0px;
        display: none;
        font: 12px/15px Lucida Sans, Helvetica, Verdana, sans-serif;
        border-radius: 5px;
        box-shadow: 2px 5px 10px rgba(0, 0, 0, .3);
    }

    .contextMenu ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .contextMenu li {
        list-style: none;
        padding: 0px;
        margin: 0px;
    }

    .contextMenu a {
        -moz-user-select: none;
        -webkit-user-select: none;
        user-select: none;
        color: var(--fg, #222);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        line-height: 20px;
        min-height: 20px;
        outline: none;
        padding: 2px 15px 2px 12px;
        cursor: default;
    }

    .contextMenu a .qa-icon {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--icon, #4B5563);
        flex-shrink: 0;
    }

    .contextMenu a .qa-icon svg,
    .contextMenu a .qa-icon img {
        width: 16px;
        height: 16px;
        display: block;
    }

    .contextMenu a .qa-label {
        flex: 1 1 auto;
        white-space: nowrap;
    }

    .contextMenu li:not(.disabled) a:hover {
        background-color: var(--accent, #2e5dea);
        color: #fff;
    }

    .contextMenu li:not(.disabled) a:hover .qa-icon {
        color: #fff;
    }

    .contextMenu li.disabled a {
        color: var(--muted, #999);
        pointer-events: none;
    }

    .contextMenu li.disabled a .qa-icon {
        opacity: .5;
    }

    /* Value-control rows host a live widget (stroke width, colour…). */
    .contextMenu li.qa-value {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 12px;
    }

    .contextMenu li.qa-value.disabled {
        opacity: .5;
        pointer-events: none;
    }

    .contextMenu li.qa-value .qa-vlabel {
        flex-shrink: 0;
        min-width: 54px;
        color: var(--muted, #6b7280);
        font-weight: 600;
        font-size: 10px;
        letter-spacing: .04em;
        text-transform: uppercase;
    }

    .contextMenu li.qa-value se-spin-input {
        flex: 1 1 auto;
        min-width: 90px;
    }

    .contextMenu .qa-empty {
        padding: 4px 15px;
        color: var(--muted, #999);
        font-style: italic;
    }

    .contextMenu li.separator {
        border-top: solid 1px var(--chrome-border, #E3E3E3);
        padding-top: 5px;
        margin-top: 5px;
    }
</style>
<ul id="cmenu_canvas" class="contextMenu"></ul>
