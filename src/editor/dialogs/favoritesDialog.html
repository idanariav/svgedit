<style>
    :not(:defined) {
        display: none;
    }

    #favorites_dialog::part(frame) {
        padding: 0;
        background: transparent;
        border: none;
        box-shadow: none;
    }

    #fav_container {
        width: 560px;
        max-width: 90vw;
        max-height: 80vh;
        display: flex;
        flex-direction: column;
        background-color: var(--chrome-bg, #fff);
        color: var(--fg, #1B1F24);
        border: 1px solid var(--chrome-border, #d0d0d0);
        border-radius: 10px;
        font-family: var(--ui-font, Verdana, Helvetica, sans-serif);
        font-size: 13px;
        overflow: hidden;
    }

    #fav_header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--chrome-border, #e0e0e0);
    }

    #fav_title {
        font-size: 15px;
        font-weight: 600;
    }

    #fav_close {
        border: none;
        background: transparent;
        color: var(--muted, #6b7280);
        font-size: 16px;
        line-height: 1;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
    }

    #fav_close:hover {
        background: var(--icon-hover-bg, #eef1f5);
        color: var(--fg, #1B1F24);
    }

    #fav_hint {
        padding: 10px 16px 0;
        color: var(--muted, #6b7280);
        font-size: 12px;
    }

    #fav_toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
    }

    #fav_search {
        flex: 1 1 auto;
        min-width: 0;
        padding: 6px 10px;
        font-size: 13px;
        color: var(--fg, #1B1F24);
        background: var(--field-bg, #fff);
        border: 1px solid var(--field-border, #d1d5db);
        border-radius: 6px;
        outline: none;
    }

    #fav_search:focus {
        border-color: var(--accent, #2563eb);
    }

    #fav_filter {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted, #6b7280);
        white-space: nowrap;
        cursor: pointer;
        user-select: none;
    }

    .fav-drag {
        color: var(--muted, #9ca3af);
        cursor: grab;
        font-size: 14px;
        line-height: 1;
        flex-shrink: 0;
        user-select: none;
        padding: 0 2px;
    }

    .fav-drag:active {
        cursor: grabbing;
    }

    .fav-row.dragging {
        opacity: 0.4;
    }

    .fav-row.drag-over {
        border-top: 2px solid var(--accent, #2563eb);
    }

    #fav_reorder_hint {
        font-size: 11px;
        color: var(--muted, #9ca3af);
        font-style: italic;
        padding: 4px 16px 0;
    }

    .fav-empty {
        color: var(--muted, #9ca3af);
        font-style: italic;
        padding: 16px 0;
        text-align: center;
    }

    #fav_list {
        overflow-y: auto;
        padding: 8px 16px;
        flex: 1 1 auto;
    }

    .fav-group-title {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: var(--muted, #6b7280);
        margin: 14px 0 4px;
    }

    .fav-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--chrome-border, #f0f0f0);
    }

    .fav-label {
        flex: 1 1 auto;
        min-width: 0;
    }

    .fav-star {
        border: none;
        background: transparent;
        color: var(--muted, #9ca3af);
        cursor: pointer;
        padding: 2px;
        line-height: 0;
        border-radius: 6px;
        flex-shrink: 0;
    }

    .fav-star:hover {
        background: var(--icon-hover-bg, #eef1f5);
        color: var(--accent, #2563eb);
    }

    .fav-star.is-fav {
        color: var(--accent, #2563eb);
    }

    .fav-star.is-fav svg {
        fill: currentColor;
    }

    .fav-star svg {
        width: 18px;
        height: 18px;
        display: block;
    }

    #fav_footer {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 12px 16px;
        border-top: 1px solid var(--chrome-border, #e0e0e0);
    }

    #fav_done {
        background: var(--accent, #2563eb);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 16px;
        font-size: 13px;
        cursor: pointer;
    }
</style>
<elix-dialog id="favorites_dialog" aria-label="Favorites" closed>
    <div id="fav_container">
        <div id="fav_header">
            <span id="fav_title">Favorites</span>
            <button id="fav_close" aria-label="Close">✕</button>
        </div>
        <div id="fav_hint"></div>
        <div id="fav_toolbar">
            <input id="fav_search" type="text" placeholder="Search" autocomplete="off" />
            <label id="fav_filter"><input id="fav_filter_fav" type="checkbox" /><span id="fav_filter_text">Favorited only</span></label>
        </div>
        <div id="fav_reorder_hint" hidden></div>
        <div id="fav_list"></div>
        <div id="fav_footer">
            <button id="fav_done">Done</button>
        </div>
    </div>
</elix-dialog>
