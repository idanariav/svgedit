<style>
    :not(:defined) {
        display: none;
    }

    /* The dialog is rendered outside the themed .svg_editor scope, so it can
       not inherit the editor's design tokens. Mirror the relevant tokens here
       and reflect the active theme onto the host (see imageImportDialog.js).
       Values must stay in sync with svgedit.css. */
    :host {
        --chrome-bg: #FFFFFF;
        --chrome-border: #E6E8EC;
        --fg: #1B1F24;
        --muted: #6B7280;
        --icon-hover-bg: #EEF1F5;
        --field-bg: #FFFFFF;
        --field-border: #DDE1E7;
        --field-border-h: #C8CDD6;
        --group-bg: #F6F7F9;
        --accent: #2962FF;
        --accent-soft: #E8EFFF;
        --accent-ring: rgba(41, 98, 255, 0.16);
        --workarea-bg: #F8F9FB;
    }

    :host(.theme-dark) {
        --chrome-bg: #1E2026;
        --chrome-border: #2C2F37;
        --fg: #ECEEF2;
        --muted: #9098A5;
        --icon-hover-bg: #2A2D35;
        --field-bg: #14161A;
        --field-border: #2C2F37;
        --field-border-h: #3C4150;
        --group-bg: #181A20;
        --accent: #F6B23A;
        --accent-soft: #3A2E18;
        --accent-ring: rgba(246, 178, 58, 0.20);
        --workarea-bg: #0F1115;
    }

    #image_import_container {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        width: 360px;
        max-width: 92vw;
        background: var(--chrome-bg, #FFFFFF);
        color: var(--fg, #1B1F24);
        border: 1px solid var(--chrome-border, #E6E8EC);
        border-radius: 14px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.22);
        overflow: hidden;
    }

    #image_import_header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-bottom: 1px solid var(--chrome-border, #E6E8EC);
    }

    #image_import_title {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
    }

    #image_import_close {
        appearance: none;
        border: none;
        background: transparent;
        color: var(--muted, #6B7280);
        font-size: 18px;
        line-height: 1;
        width: 26px;
        height: 26px;
        border-radius: 7px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .12s, color .12s;
    }

    #image_import_close:hover {
        background: var(--icon-hover-bg, #F1F3F5);
        color: var(--fg, #1B1F24);
    }

    #image_import_body {
        padding: 16px;
    }

    /* Drop zone */
    #image_dropzone {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 26px 16px;
        border: 2px dashed var(--field-border, #DDE1E7);
        border-radius: 12px;
        background: var(--group-bg, #F6F7F9);
        color: var(--muted, #6B7280);
        text-align: center;
        cursor: pointer;
        transition: border-color .12s, background .12s, color .12s;
    }

    #image_dropzone:hover {
        border-color: var(--field-border-h, #C8CDD6);
    }

    #image_dropzone.dragover {
        border-color: var(--accent, #2962FF);
        background: var(--accent-soft, #E8EFFF);
        color: var(--fg, #1B1F24);
    }

    #image_dropzone svg {
        width: 26px;
        height: 26px;
        stroke: currentColor;
        fill: none;
    }

    #image_dropzone_text {
        font-size: 13px;
    }

    #image_browse_btn {
        appearance: none;
        border: 1px solid var(--field-border, #DDE1E7);
        background: var(--field-bg, #FFFFFF);
        color: var(--fg, #1B1F24);
        font-size: 13px;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 8px;
        cursor: pointer;
        transition: border-color .12s, background .12s;
    }

    #image_browse_btn:hover {
        border-color: var(--accent, #2962FF);
    }

    #image_file_input {
        display: none;
    }

    /* "or" divider */
    .image_import_or {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 14px 0;
        color: var(--muted, #6B7280);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .04em;
    }

    .image_import_or::before,
    .image_import_or::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--chrome-border, #E6E8EC);
    }

    /* URL field */
    #image_url_label {
        display: block;
        margin: 0 0 6px 2px;
        font-size: 12px;
        color: var(--muted, #6B7280);
    }

    #image_url_input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 13px;
        color: var(--fg, #1B1F24);
        background: var(--field-bg, #FFFFFF);
        border: 1px solid var(--field-border, #DDE1E7);
        border-radius: 8px;
        transition: border-color .12s, box-shadow .12s;
    }

    #image_url_input:focus {
        outline: none;
        border-color: var(--accent, #2962FF);
        box-shadow: 0 0 0 3px var(--accent-ring, rgba(41, 98, 255, 0.16));
    }

    /* Preview */
    #image_preview_row {
        display: none;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
        padding: 8px;
        border: 1px solid var(--chrome-border, #E6E8EC);
        border-radius: 10px;
        background: var(--group-bg, #F6F7F9);
    }

    #image_preview_row.show {
        display: flex;
    }

    #image_preview {
        width: 52px;
        height: 52px;
        object-fit: contain;
        border-radius: 6px;
        background: var(--workarea-bg, #FFFFFF);
        flex: 0 0 auto;
    }

    #image_preview_name {
        font-size: 12px;
        color: var(--muted, #6B7280);
        word-break: break-all;
    }

    #image_import_error {
        display: none;
        margin-top: 10px;
        font-size: 12px;
        color: #e5484d;
    }

    #image_import_error.show {
        display: block;
    }

    /* Footer */
    #image_import_footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 14px 16px;
        border-top: 1px solid var(--chrome-border, #E6E8EC);
    }

    #image_import_footer button {
        appearance: none;
        font-size: 13px;
        font-weight: 500;
        padding: 7px 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: background .12s, border-color .12s, opacity .12s;
    }

    #image_import_cancel {
        border: 1px solid var(--field-border, #DDE1E7);
        background: var(--field-bg, #FFFFFF);
        color: var(--fg, #1B1F24);
    }

    #image_import_cancel:hover {
        border-color: var(--field-border-h, #C8CDD6);
    }

    #image_import_ok {
        border: 1px solid var(--accent, #2962FF);
        background: var(--accent, #2962FF);
        color: #FFFFFF;
    }

    #image_import_ok:disabled {
        opacity: 0.45;
        cursor: default;
    }

    /* Amber accent in dark theme needs dark text for contrast. */
    :host(.theme-dark) #image_import_ok {
        color: #1B1F24;
    }
</style>
<elix-dialog id="image_import_box" aria-label="insert image" closed>
    <div id="image_import_container">
        <div id="image_import_header">
            <p id="image_import_title">Insert image</p>
            <button id="image_import_close" type="button" aria-label="Close">&#x2715;</button>
        </div>
        <div id="image_import_body">
            <div id="image_dropzone" role="button" tabindex="0">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 16V4"></path>
                    <path d="M7 9l5-5 5 5"></path>
                    <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"></path>
                </svg>
                <span id="image_dropzone_text">Drag an image here</span>
                <button id="image_browse_btn" type="button">Browse…</button>
            </div>
            <input type="file" id="image_file_input" accept="image/*" />

            <div class="image_import_or"><span id="image_import_or_text">or</span></div>

            <label id="image_url_label" for="image_url_input">Image URL</label>
            <input type="text" id="image_url_input" placeholder="Paste an image URL" />

            <div id="image_preview_row">
                <img id="image_preview" alt="" />
                <span id="image_preview_name"></span>
            </div>
            <div id="image_import_error">Could not load that image URL.</div>
        </div>
        <div id="image_import_footer">
            <button id="image_import_cancel" type="button">Cancel</button>
            <button id="image_import_ok" type="button" disabled>Insert</button>
        </div>
    </div>
</elix-dialog>
