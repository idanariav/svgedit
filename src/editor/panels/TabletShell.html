<div class="tablet-shell">
  <div class="ts-topbar">
    <div class="ts-grow"></div>
    <div class="ts-toolgroup" id="ts_toolgroup"></div>
    <div class="ts-grow"></div>
    <div class="ts-stylechip" id="ts_stylechip" title="Default style"><span class="dot" id="ts_styledot"></span></div>
    <div class="ts-row" id="ts_zoom"></div>
    <div class="ts-sep"></div>
    <div class="ts-row" id="ts_hist"></div>
    <button class="ts-done" id="ts_done">Done</button>
  </div>

  <div class="ts-sheet" id="ts_sheet">
    <div class="ts-sheet-handle"></div>
    <span class="kind" id="ts_sheet_kind">Shape</span>
    <span class="closeb" id="ts_sheet_close"></span>
    <div class="ts-sheet-row" id="ts_sheet_row"></div>
  </div>
</div>
