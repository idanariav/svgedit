<div id="tools_top">
  <div id="title_panel">
    <p>untitled.svg</p>
  </div> <!-- title panel -->
  <div id="editor_panel">
    <se-button id="tool_frame" title="tools.tool_frame" shortcut="U" src="frame.svg"></se-button>
    <se-button id="tool_wireframe" title="tools.wireframe_mode" shortcut="F" src="wireframe.svg"></se-button>
    <se-canvas-settings id="tool_canvas_settings" title="Canvas settings" src="canvas.svg"></se-canvas-settings>
  </div> <!-- editor_panel (view toggles) -->
  <div id="theme_panel"></div> <!-- theme_panel -->
  <!-- Path node editing (transient, pathedit mode) -->
  <div class="path_node_panel quick_tray">
    <se-button id="tool_node_link" title="tools.node_link" src="tool_node_link.svg" pressed></se-button>
    <se-spin-input id="path_node_x" data-attr="x" size="4" title="properties.node_x" label="properties.x_label">
    </se-spin-input>
    <se-spin-input id="path_node_y" data-attr="y" size="4" title="properties.node_y" label="properties.y_label">
    </se-spin-input>
    <se-select id="seg_type" title="properties.seg_type" label=""
      options="properties.straight_segments,properties.curve_segments" values="4::6"></se-select>
    <se-button id="tool_node_clone" title="tools.node_clone" src="tool_node_clone.svg"></se-button>
    <se-button id="tool_node_delete" title="tools.node_delete" src="tool_node_delete.svg"></se-button>
    <se-button id="tool_openclose_path" title="tools.openclose_path" src="tool_openclose_path.svg"></se-button>
    <se-button id="tool_add_subpath" title="tools.add_subpath" src="tool_add_subpath.svg"></se-button>
  </div> <!-- path_node_panel -->
  <div id="history_panel">
    <se-button id="tool_undo" title="tools.undo" shortcut="ctrl+Z" src="undo.svg" disabled></se-button>
    <se-button id="tool_redo" title="tools.redo" shortcut="ctrl+Y" src="redo.svg" disabled></se-button>
  </div> <!-- history_panel (pushed to the right) -->
  <!-- Object actions when a single element is selected: clone / delete / arrange / flip / align -->
  <div class="selected_panel quick_tray" style="display:none">
    <se-button id="tool_clone" title="tools.clone" shortcut="D" src="clone.svg"></se-button>
    <se-button id="tool_delete" title="tools.del" shortcut="Delete/Backspace" src="delete.svg"></se-button>
    <se-list id="tool_arrange" src="move_top.svg" title="tools.arrange" width="28px" height="28px">
      <se-list-item id="arrange_front" value="front" title="tools.move_top" src="move_top.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="arrange_forward" value="forward" title="tools.move_forward" src="move_forward.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="arrange_backward" value="backward" title="tools.move_backward" src="move_backwards.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="arrange_back" value="back" title="tools.move_bottom" src="move_bottom.svg"
        img-height="22px"></se-list-item>
    </se-list>
    <se-button id="tool_flip_h" title="tools.flip_horizontal" src="flip_horizontal.svg"></se-button>
    <se-button id="tool_flip_v" title="tools.flip_vertical" src="flip_vertical.svg"></se-button>
    <se-list id="tool_position" src="align.svg" title="tools.align_to_page" label="" width="28px" height="28px">
      <se-list-item id="tool_posleft" value="l" title="tools.align_left" src="align_left.svg" img-height="22px">
      </se-list-item>
      <se-list-item id="tool_poscenter" value="c" title="tools.align_center" src="align_center.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="tool_posright" value="r" title="tools.align_right" src="align_right.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="tool_postop" value="t" title="tools.align_top" src="align_top.svg" img-height="22px">
      </se-list-item>
      <se-list-item id="tool_posmiddle" value="m" title="tools.align_middle" src="align_middle.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="tool_posbottom" value="b" src="align_bottom.svg" title="tools.align_bottom"
        img-height="22px"></se-list-item>
      <se-list-item id="tool_poshoriz" value="dh" src="align_distrib_horiz.svg" title="tools.align_distrib_horiz"
        img-height="22px"></se-list-item>
      <se-list-item id="tool_posverti" value="dv" src="align_distrib_verti.svg" title="tools.align_distrib_verti"
        img-height="22px"></se-list-item>
    </se-list>
  </div>
  <!-- Object actions when multiple elements are selected: clone / delete / group / arrange / align -->
  <div class="multiselected_panel quick_tray" style="display:none">
    <se-button id="tool_clone_multi" title="tools.clone" shortcut="C" src="clone.svg"></se-button>
    <se-button id="tool_delete_multi" title="tools.del" shortcut="Delete/Backspace" src="delete.svg"></se-button>
    <se-button id="tool_group_elements" title="tools.group_elements" shortcut="G" src="group_elements.svg">
    </se-button>
    <se-list id="tool_arrange_multi" src="move_top.svg" title="tools.arrange" width="28px" height="28px">
      <se-list-item id="arrange_front_multi" value="front" title="tools.move_top" src="move_top.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="arrange_forward_multi" value="forward" title="tools.move_forward" src="move_forward.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="arrange_backward_multi" value="backward" title="tools.move_backward"
        src="move_backwards.svg" img-height="22px"></se-list-item>
      <se-list-item id="arrange_back_multi" value="back" title="tools.move_bottom" src="move_bottom.svg"
        img-height="22px"></se-list-item>
      <se-list-item id="arrange_switch" value="switch" title="tools.switch_layers" src="switch_layer.svg"
        img-height="22px"></se-list-item>
    </se-list>
    <se-list id="tool_align_multi" src="align.svg" title="tools.align_to_page" width="28px" height="28px">
      <se-list-item value="l" title="tools.align_left" src="align_left.svg" img-height="22px"></se-list-item>
      <se-list-item value="c" title="tools.align_center" src="align_center.svg" img-height="22px"></se-list-item>
      <se-list-item value="r" title="tools.align_right" src="align_right.svg" img-height="22px"></se-list-item>
      <se-list-item value="t" title="tools.align_top" src="align_top.svg" img-height="22px"></se-list-item>
      <se-list-item value="m" title="tools.align_middle" src="align_middle.svg" img-height="22px"></se-list-item>
      <se-list-item value="b" title="tools.align_bottom" src="align_bottom.svg" img-height="22px"></se-list-item>
      <se-list-item value="dh" title="tools.align_distrib_horiz" src="align_distrib_horiz.svg"
        img-height="22px"></se-list-item>
      <se-list-item value="dv" title="tools.align_distrib_verti" src="align_distrib_verti.svg"
        img-height="22px"></se-list-item>
    </se-list>
    <se-select id="tool_align_relative" label="tools.relativeTo"
      options="tools.selected_objects,tools.largest_object,tools.smallest_object,tools.page"
      values="selected::largest::smallest::page">
    </se-select>
  </div>
  <!-- Ungroup (shown for a selected group / link) -->
  <div class="g_panel quick_tray" style="display:none">
    <se-button id="tool_ungroup" title="tools.ungroup" src="ungroup.svg"></se-button>
  </div>
  <!-- Zoom (far right) -->
  <div id="zoom_panel">
    <se-zoom id="zoom" src="zoom.svg" title="Change zoom level" inputsize="40px">
      <se-text value="1000" text="1000%"></se-text>
      <se-text value="400" text="400%"></se-text>
      <se-text value="200" text="200%"></se-text>
      <se-text value="100" text="100%"></se-text>
      <se-text value="50" text="50%"></se-text>
      <se-text value="25" text="25%"></se-text>
      <se-text value="canvas" text="tools.fit_to_canvas"></se-text>
      <se-text value="selection" text="tools.fit_to_sel"></se-text>
      <se-text value="layer" text="tools.fit_to_layer_content"></se-text>
      <se-text value="content" text="tools.fit_to_all"></se-text>
    </se-zoom>
  </div>
  <!-- The text edit buffer (#text) moved to editorTemplate.html so it stays
       focusable when this panel is hidden (e.g. tablet mode). -->
  <div id="cur_context_panel"></div>
</div>
