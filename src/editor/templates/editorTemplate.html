<div class="svg_editor">
  <div id="workarea">
    <div id="svgcanvas">
      <!-- Faint brand watermark shown only on an empty drawing (no objects yet). -->
      <div id="canvas_watermark" aria-hidden="true"></div>
    </div>
  </div>
  <!-- Not visible, but still used (text edit buffer). Lives at the editor root
       (not inside a panel) so it stays focusable when a panel is hidden — e.g.
       in tablet mode, where #tools_top is display:none and a focus() on a
       display:none subtree is a no-op (keystrokes would otherwise fall through
       to the global tool shortcuts). Positioned offscreen via #text in svgedit.css. -->
  <textarea id="text" rows="1" wrap="off"></textarea>
</div>
